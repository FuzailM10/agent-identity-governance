# Phase 0 skeleton: the "engine" (control plane) + Postgres, both in Docker.
# Run everything with:  docker compose up --build
# (Keycloak and OPA get added here in later phases.)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: aig
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  engine:
    build: ./engine
    environment:
      # The engine talks to the db container by its service name "db".
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/aig
    ports:
      - "8000:8000"
    volumes:
      # Live-reload: your local code edits show up in the container instantly.
      - ./engine/app:/app/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
